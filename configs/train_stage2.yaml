# Stage 2: Multitask Instruction Tuning
# Trains bridge + decoder LoRA on instruction-following data

output_dir: outputs/stage2_multitask
num_epochs: 3
max_steps: 50000
batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 0.00002
weight_decay: 0.01
warmup_steps: 500
max_grad_norm: 1.0
bf16: true
fp16: false
logging_steps: 10
save_steps: 2000
eval_steps: 2000
seed: 42
